#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           Pseudo_compensated_self_cascode_OTA 
description:    Simple voltage buffer for capacitive load realized with 5T-OTA
PDK:            ihp-sg13g2 # (for IIC-OSIC-Tools version 2025.01 or newer)
#PDK:           sg13g2 # (for IIC-OSIC-Tools version 2024.12 or older)

cace_format:    5.2

authorship:
  designer:         Harald Pretl
  company:          Johannes Kepler University
  creation_date:    August 25, 2024
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        xschem
  netlist:          cace/netlist
  documentation:    cace/_docs
  runs:             _runs

pins:
  VDD:
    description: Positive analog power supply
    type: power
    direction: inout
    Vmin: 1.15
    Vmax: 1.25
  VSS:
    description: Analog ground
    type: ground
    direction: inout
  V_BN:
    description: Bias bulk N voltage input.
    type: signal
    direction: input
  V_BP:
    description: Bias bulk P voltage input
    type: signal
    direction: input
  VP:
    description: Voltage positive input
    type: signal
    direction: input
  VN:
    description: Voltage negative input
    type: signal
    direction: input
  V_OUT:
    description: Voltage output
    type: signal
    direction: output

default_conditions:
  vdd:
    description: Analog power supply voltage
    display: VDD
    unit: V
    typical: 1.2
  corner:
    description: Process corner
    display: Corner
    typical: tt
  temp:
    description: Ambient temperature
    display: Temperature
    unit: °C
    typical: 27
  cload:
    description: Load capacitance
    display: Cload
    unit: pF
    typical: 2

parameters:
  ac_params:
    spec:
      gain:
        display: Output voltage ratio
        description: Large-signal dc gain
        unit: V/V
        minimum:
          value: 0.97
        typical:
          value: any
        maximum:
          value: 1.03
      bw:
        display: Bandwidth
        description: The -3dB bandwidth of the buffer
        unit: Hz
        minimum:
          value: 15e6
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: OTA_tb_ac.sch
        format: ascii
        suffix: .data
        variables: [gain, bw]
    plot:
      gain_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: gain
        limits: auto
      gain_vs_vin:
        type: xyplot
        xaxis: vin
        yaxis: gain
        limits: auto
      gain_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: gain
        limits: auto
      gain_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: gain
        limits: auto
      bw_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: bw
        limits: auto
      bw_vs_vin:
        type: xyplot
        xaxis: vin
        yaxis: bw
        limits: auto
      bw_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: bw
        limits: auto
      bw_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: bw
        limits: auto
    conditions:
      corner:
        enumerate: [ss, sf, tt, fs, ff]
      vdd:
        minimum: 1.15
        typical: 1.2
        maximum: 1.25
      vin:
        minimum: 0.5
        typical: 0.6
        maximum: 0.7
      temp:
        minimum: -40
        typical: 27
        maximum: 130

  ac_mc_params:
    spec:
      gain_mc:
        display: Output voltage ratio (MC)
        description: Large-signal dc gain (Monte Carlo)
        unit: V/V
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      bw_mc:
        display: Bandwidth (MC)
        description: The -3dB bandwidth of the buffer (Monte Carlo)
        unit: Hz
        minimum:
          value: 15e6
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: OTA_tb_ac.sch
        collate: iterations
        format: ascii
        suffix: .data
        variables: [gain_mc, bw_mc]
        script: OTA_tb_ac.py
        script_variables: [gain_mc_arr, bw_mc_arr]
    plot:
      gain_mc:
        type: histogram
        xaxis: gain_mc_arr
      bw_mc:
        type: histogram
        xaxis: bw_mc_arr
    conditions:
      iterations: # for Monte Carlo
        description: Iterations to run
        display: Iterations
        minimum: 1
        maximum: 100
        step: linear
        stepsize: 1
      sigma:
        # This is actually mc_ok.
        # If mc_ok = 1: MC with 3 sigma.
        # If mc_ok = 0: MC is turned off.
        # https://github.com/IHP-GmbH/IHP-Open-PDK/issues/149
        #minimum: 0
        typical: 1
      corner:
        typical: tt_stat # Monte Carlo corner for TT
      vdd:
        typical: 1.2
      vin:
        typical: 0.6
      temp:
        typical: 27
        
  noise_params:
    spec:
      noise:
        display: Output noise
        description: Total output noise (rms)
        unit: mV
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: 1
    tool:
      ngspice:
        template: OTA_tb_noise.sch
        format: ascii
        suffix: .data
        variables: [noise]
    plot:
      noise_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: noise
        limits: auto
      noise_vs_vin:
        type: xyplot
        xaxis: vin
        yaxis: noise
        limits: auto
      noise_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: noise
        limits: auto
      noise_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: noise
        limits: auto
    conditions:
      corner:
        enumerate: [ss, sf, tt, fs, ff]
      vdd:
        minimum: 1.15
        typical: 1.2
        maximum: 1.25
      vin:
        minimum: 0.5
        typical: 0.6
        maximum: 0.7
      temp:
        minimum: -40
        typical: 27
        maximum: 130
      
  tran_params:
    spec:
      tsettle:
        display: Settling time
        description: Settling time of output
        unit: us
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: 10
    tool:
      ngspice:
        template: OTA_tb_tran.sch
        format: ascii
        suffix: .data
        variables: [tsettle]
    plot:
      settling_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: tsettle
        limits: auto
      settling_vs_vin:
        type: xyplot
        xaxis: vin
        yaxis: tsettle
        limits: auto
      settling_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: tsettle
        limits: auto
      settling_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: tsettle
        limits: auto
    conditions:
      corner:
        enumerate: [ss, sf, tt, fs, ff]
      vdd:
        minimum: 1.15
        typical: 1.2
        maximum: 1.25
      vin:
        minimum: 0.5
        typical: 0.6
        maximum: 0.7
      temp:
        minimum: -40
        typical: 27
        maximum: 130
